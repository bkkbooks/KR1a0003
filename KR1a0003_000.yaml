body:
  text: 鄭康成學費氏易為注九卷多論互體以互體求易左氏以来有之凡卦爻二至四三至五兩體交互各成一卦是謂一卦含四卦繫辭謂之中爻所謂八卦相盪六爻相雜唯其時物雜物撰徳是也唯乾坤无互體蓋純乎陽純乎隂也餘六子之卦皆有互體坎之六畫其互體含艮震而艮震之互體亦含坎離之六畫其互體含兊巽而兊巽之互體亦含離三陽卦之體互自相含三隂卦之體亦互自相含也王弼尚名理譏互體然注睽六二曰始雖受困終獲剛助睽自𥘉至五成困此用互體也弼注比六四之類或用康成之說鍾㑹著論力排互體而荀顗難之江左鄭學與王學並立荀崧謂康成書根源顔延之為祭酒黜鄭置王齊陸澄詒王儉書云易自商瞿之後雖有異家之學同以象數為宗數年後乃有王弼之說王濟云弼所誤者多何必能頓廢先儒今若弘儒鄭注不可廢河北諸儒専主鄭氏隋興學者慕弼之學遂為中原之師此景迂眺氏所慨歎也易有聖人之道四焉理義之學以其辭耳變象占其可闕乎李鼎祚云鄭多參天象王全釋人事易道豈偏滯於天人哉今鄭注不傳其說間見于鼎祚集觧及釋文詩三禮春秋義疏後漢書文選注因綴而録之先儒象數之學於此猶有考云然康成箋詩多改字注易亦然如包蒙為彪豶豕之牙為互包荒讀為康錫馬蕃庻讀為蕃遮皆甲宅之皆讀為觧一握為笑之握讀為屋其說近乎鑿學者盇謹擇焉厭常喜新其不為荄兹者幾希浚儀王應麟識
