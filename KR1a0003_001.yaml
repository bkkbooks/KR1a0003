  text: 周易鄭康成注
  hash: sha256:242266f47b362d71f3afa7b8a3be927ab4a8db3761504ed2d7f36576032644c5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0003_SBCK_001-1a}
body:
  text: 浚儀王應麟伯厚甫纂輯乾九二見龍在田二於三才為地道地上即田故稱田也九二利見九五之大人九三君子終日乾乾三於三才為人道有乾德而在人道君子之象九五飛龍在天五於三才為天道天者清明無形而龍在焉飛之象也上九亢龍有悔堯之末年四凶在朝是以有悔未大凶也用九見群龍無首吉六爻皆體龍乾一作群龍之象也舜既受道禹與稷契咎繇之屬並在于朝萬物資始乃統天資取也統本也大人造也造為也不成乎名當隱之時以從世俗不自殊異旡所成名也確乎其不可拔拔移也聖人作作起也利貞者情性也坤履霜履讀為禮六二直也方也地之性此爻得中氣而在地上自然之性廣生萬物故生動直而且方龍戰于野聖人喻龍君子喻蛇君子之類儀禮注蛇龍必有餘殃殃禍惡也嫌於無陽嫌讀如群公慊之慊古書篆作立心與水相近讀者失之故作溓溓雜也隂謂此上六也陽謂今消息用事乾也上六為蛇得乾氣雜似龍鄭作謙釋文云屯而不寧讀而曰能能猶安也六二乘馬般如馬牝牡曰乘冓猶會也六三機不如舍弩牙也蒙蒙幼小之貌齊人謂萌為蒙也蒙亨匪我求童蒙蒙者蒙蒙物𥘉生形是其未開著之名也人幼稚曰童未冠之稱亨者陽也互體震而得中嘉會禮通陽自動其中德於地道之上萬物應之而萌牙生教授之師取象焉修道藝於其室而童蒙者求為之弟子非已乎求之也弟子𥘉問則告之以事義不思其三隅相况以反解而筮者此勤師而功寡學者之災也瀆筮則不復告欲令思而得之亦所以利義而幹事是也𥘉六用説桎梏木在足曰桎在手曰梏九二包蒙包當作彪彪文也六五順以巽也巽當作遜需需讀為秀陽氣秀而不直前者畏上坎也位乎天位位音涖宴享宴也九二需于沚九三致戎至訟辨財曰訟有孚嘻嘻覺悔貌九二歸而逋其邑人三百戶無眚小國之下大夫采地方一成其定稅三百家故三百戶也不易之田嵗種之一易之田休一嵗乃種再易之地休二歲乃種言至薄也茍自藏隱不敢與五相敵則無災眚眚過也患至惙也惙憂也九四渝然也上九鞶帶佩鞶之帶三拖之反徒可師軍二千五百人為師多以軍為名次以師為名少以旅為名師者舉中之言丈人能以法度長於人丈之言長能御衆有正人之德以法度為人之長吉而無咎謂天子諸侯主軍者𥘉六否臧凶否方有反九二五三賜命寵光耀也比𥘉六有孚盈缶爻辰在未上值東井井之水人所汲用缶缶汲器也九五王用三驅失前禽王因天下顯習兵于搜狩焉驅禽而射之三則已發軍禮也失前禽者謂禽在前來者不逆而射之傍去又不射唯背走者順而射之不中亦已是皆所以失之用兵之法亦如之降者不殺奔者不禁背敵不殺以仁恩養威之道小畜畜養也九三輿説輻謂輿下縛木與軸相連鈎心之木是也莬輻伏泰泰通也后以財成天地之道財節也輔相左右助也以者取其順隂陽之節為出內之政春崇寬仁夏以長養秋教收斂冬勑蓋藏皆可以成物助民也𥘉九彚類也茹牽引也茅喻君有潔白之德臣下引其類而仕之苖茅音九二荒讀為康虛也六五帝乙歸妹以祉元吉五爻辰在卯春為陽中萬物以生生育者嫁娶之貴仲春之月嫁娶男女之禮福祿大吉否九四􅔧離祉九五繫于苞桑猶紂囚文王於羑里之獄四臣獻珍異之物而終免於難繫于苞桑之謂同人乾為天離為火卦體有巽巽為風天在上火炎上而從之是其性同於天也火得風然後炎上益熾是猶人君在上施政教使天下之人和同而事之以是為人和同者君之所為也故謂之同人風行無所不遍遍則會通之德大行故曰同人于野亨六二天子諸侯后夫人無子不出九三莽叢木也九四乘其庸大有明辨遰也星晢晢讀如明六五體離處乾之上猶大臣有聖明之德代君為政處其位有其事而理之也元亨者又能長群臣以善使嘉會禮通若周公攝政朝諸侯於明堂是也謙君子有終艮為山坤為地山體髙今在地下其於人道高能下下謙之象亨者嘉會之禮以謙為主謙者自貶損以下人唯艮之堅固坤之厚順乃能終之故君子之人有終也捊多益寡也捊取撝謙宣讀為𥘉六牧養也豫坤順也震動也順其性而動者莫不得其所故謂之逸逸喜逸恱樂之貌也震又為雷諸侯之象坤又為衆師役之象故利建侯行師靁出地奮奮動也靁動於地上而萬物豫也忒差也六二砎于石八古磨砎也切謂六三盱誇也九四由豫由用也簮速也上六冥豫為鳴冥讀隨震動也兑説也內動之以德外説之以言則天下之人民一作咸慕其行而隨從之故謂之隨也既見隨從能長之以善通其嘉禮和之以義幹之以正則功成而有福若無此四德則有凶咎焉出門交有功震為大塗又為日門當春分隂陽之所交也是臣出君門與四方賢人交有成功之象也昔舜慎徽五典五典克從納于百揆百揆時序賔于四門四門穆穆是其義也蠱先甲三日後甲三日甲者造作新令之日先之三日而用辛也欲取攺過自新之義後之三日而用丁也取其丁寧之義臨大夫貢士於其君必以禮賔之唯主人盥而獻賔賔盥而酢主人設薦爼則弟子也𥘉六童觀童雉也噬嗑敕法敕猶理也九四噬乾胏胏簀也上九離為稿木坎為耳木在耳上何校滅耳之象也聰不明也目不明耳不聰賁賁變也文飾之貌賁文飾也離為日日天文也艮為石石地文也天文在下地文在上天地之文交相飾成賁者也猶人君以剛柔仁義之道飾成其德也剛柔雜仁義合然後嘉會禮通故亨也卦互體坎艮艮止於上坎險於下夾震在中故不利大行小有所之則可矣折獄折斷也𥘉九舍輿而徒六四賁如燔如六四巽爻也有應於𥘉九欲自飾以適𥘉既進退未定故燔如也白馬翰如設九三位在辰得巽氣為白馬翰猶幹也見六四適𥘉未定欲幹而有之翰白也剝隂氣侵陽上至於五萬物零落故謂之剝也五隂一陽小人極盛君子不可有所之故不利有攸往也六二剝牀以辨足上稱辨謂近膝之下屈則相近申則相逺故謂之辨辨分也蔑輕慢六四切近災也切急也小人剝廬小人傲很當剝徹廬舍而去復復反也還也隂氣侵陽陽失其位至此始還反起於𥘉故謂之復陽君象君失國而還反道德更興也商旅不行資貨而行曰啇旅客也𥘉九無祇悔祗病也六三卑復六五中以自考考成也上六有災眚異自內生曰眚自外曰祥害物曰災無妄妄猶望謂無所希望也祐助也六二不災畬一嵗曰災二嵗曰新田三嵗曰畬大畜日新絶句其德連下句良馬逐逐兩馬走也日間輿衛日習車徒自九三至上九有頥象居外是不家食而養賢六四童牛之梏元吉巽為木互體震震為牛之足足在艮體之中艮為手持木以就足是施梏曰梏今大畜六四施梏于足不審桎梏手足鄭志泠剛問蒙𥘉六注云木在足曰桎在手無手故以足言之定有别否答曰牛六五豶豕之牙為互牙讀上九艮為手手上肩也乾為首首肩之間荷物處乾為天艮為徑路天衢象也頥朵動也頥者口車輔之名也震動於下艮止於上口車動而上因輔嚼物以養人故謂之頥頥飬也能行養則其幹事故吉矣二五離爻皆得中離為目觀象也觀頥觀其養賢與不肖也頥中有物曰口實自二至五有二坤坤載飬物而人所食之物皆存焉觀其求可食之物則貪廉之情可别也大過九二枯楊生荑枯姑音謂無姑山榆荑木更生夷音謂山榆之實以丈夫年過娶二十之女老婦年過嫁於三十之男皆得其子習坎六三檢且枕木在手曰檢木在首曰枕六四尊酒簋二用缶納約自牖六四上承九五又互體在震上爻辰在丑丑上值斗可以斟之象斗上有建星建星之形似簋二副也建星上有辨星辨星之形又如缶天子大臣以王命出會諸侯主國尊於簋副設玄酒而用缶也九五祗既平祇當為坻小丘也上六繫拘也爻辰在己巳為蛇蛇之蟠屈似徽墨也三五互體艮又與震同體艮為門闕於木為多莭震之所為有叢拘之類門闕之內有叢木多莭之木是天子外朝左右九棘之象也外朝者所以詢事之處也左嘉石平罷民焉右肺石逹窮民焉罷民邪惡之民也上六乘陽有邪惡之罪故縛約徽墨置于叢棘而後公卿以下議之其害人者置之圜土而施職事焉以明刑耻之能復者上罪三年而赦中罪二年而赦下罪一年而赦不得者不自思以得正道終不自改而出圜土者殺故凶離明兩作離作起也九三不擊缶而歌艮爻也位近丑丑上值辨星辨星似缶詩云坎其擊缶則樂器亦有缶麗王公也九四突如其來如震為長子爻失正又互體兑兑為附決子居明法之家而無正何以自斷其君父不志也突如震之失正不知其所如又為巽巽為進退不知所從不孝之罪五刑莫大焉得用議貴之辟刑之若如所犯之罪焚如殺其親之刑死如殺人之刑也棄如流宥之刑咸咸感也艮為山兑為澤山氣下澤氣上二氣通而相應以生萬物故曰咸也其於人也嘉會禮通和順於義幹事能正三十之男有此三德以下二十之女正而相親説娶之則吉也初六拇足大指也六二腓膞腸也九五脢背脊肉也上六媵口説也媵送也咸道極薄徒送口舌言語相感而已不復有志於其間恆恆久也巽為風震為雷雷風相須而養物猶長女承長男夫婦同心而成家久長之道也夫婦以嘉會禮通故無咎其能和順幹事所行而善矣𥘉六濬恆九三或承之羞巽為進退不恆其德之象又互體兑兑為毁折後將有羞辱也上六振恆振搖落也遁遁逃去之名也艮為門闕乾有健德互體有巽巽為進退君子出門行有進退逃去之象曰五得位而有應是用正道得禮見召聘始仕他國當尚謙謙小其和順之道居小官幹小事其進以漸則逺妬忌之害昔陳敬仲奔齊辭卿是也九三憊困也九四否塞也備鄙反大壯壯氣力浸強之名九三纍其角六五喪羊于易亦音謂佼易也上六不祥也祥善也晉康侯康尊也廣也晝日三接捷音接勝也蕃庶蕃反發袁庶反止奢謂蕃遮禽也明出地上晉地雖生萬物日出於上其功乃著故君子法之而以明自照其德𥘉六摧如崔崔之崔讀如南山六二愁如變色貌愁子小反九四鼫鼠詩云碩鼠碩鼠無食我黍謂大鼠也六五矢得勿恤明夷夷傷也日出地上其明乃光至其入也明則傷矣故謂之明夷日之明傷猶聖人君子有明德而遭亂丗抑在下位則冝自艱無幹事政以避小人之害也文王似之箕子似之拯承也六二明夷睇于左股旁視為睇六二辰在酉酉是西方又下體離離為目九三體在震震東方九三又在辰辰得巽氣為股此謂六二有明德欲承九三故云睇于左股家人𥘉九間習也九三嗃嗃苦熱之意嘻嘻驕佚喜笑之意九五假登也六二中饋酒食也睽睽乖也火欲上澤欲下猶人同居而志異也故謂之睽二五相應君隂臣陽君而應臣故小事吉圭睽音六三其牛觢牛角皆踊曰觢蹇往得中也中和也𥘉六冝待時也六四往蹇來連連如字遲久之意解百果草木皆甲宅木實曰果皆讀如人倦之解解謂坼呼亞反呼火皮曰甲根曰宅宅居也損艮為山兑為澤互體坤坤為地山在地上澤在地下擇以自損增山之髙也猶諸侯損其國之冨以貢獻於天子故謂之損矣二簋可用享四以簋進黍稷於神也𥘉與二直其四與五承上故用二簋四巽爻也巽為木五離爻也離為日日體圜木器而圜簋象也六五十朋之龜案爾雅云十朋之龜者一曰神龜二曰靈龜三曰攝龜四曰寶龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜徴忿懫欲徴猶清也懫止也益隂陽之義陽稱為君隂為臣今震一陽二隂臣多於君矣而四體巽之不應初是天子損其所有以下諸侯也人君之道以益下為德故謂之益也震為雷巽為風雷動風行二者相成猶人君出教令臣奉行之故利有攸往利涉大川矣夬夬決也陽氣浸長至于五五尊位也而隂先之是猶聖人積德恱天下以漸消去小人至於受命為天子故謂之決揚越也五互體乾乾為君又居尊位王庭之象也隂爻越其上小人乘君子罪惡上聞於聖人之朝故曰決揚于王庭九二惕號號音莫夜無也無莫如字一夜夜非九三壯于頯頯夾面也九五莧陸一名商陸遘遘遇也一隂承五陽一女當五男苟相遇耳非禮之正故謂之遘女壯如是壯健似淫故不可娶婦人以婉娩為其德也詰四方詰正也九五𣏌桞也萃萃亨字無亨萃聚也坤為順兑為恱臣下以順道承事其君恱德居上待之上下相應有事而和通故曰萃亨也假至也互有艮巽為木艮為闕木在闕上宫室之象也四本震爻震為長子五夲坎爻坎為隱伏居尊而隱伏鬼神之象長子入闕升堂祭祖禰之禮也故曰王假有廟二本離爻也離為目居正應五故利見大人矣大牲牛也言大人有嘉會時可幹事必殺牛以盟既盟則可以故曰利往除戎器除去也𥘉六一握握當讀為夫三為屋之屋六二禴夏祭名上六自目曰涕自鼻曰洟升升上也坤地巽木木生地中日長而上猶聖人在諸侯之中明德日益髙大也故謂之升升進益之象六四王用亨于岐山亨獻也許兩反困坎為月互體離離為日兑為暗昧日所入也今上掩日月之明猶君子處亂世為小人所不容故謂之困也君子雖困居險能恱是以通而無咎也九二困于酒食朱韍方來利用享祀二據𥘉辰在未未為正此二為大夫有地之象未上值天厨酒食象困於酒食者采地薄不足已用也二與日為體離為鎮霍爻四為諸侯有明德受命當王者離為火火色赤四爻辰在午時離氣赤又朱是也文王將王天子制用朱韍朱深云赤九五劓刖當為倪㐳井井法也坎水也巽木桔橰也互體離兑離外堅中虛瓶也兑為暗澤泉口也言桔橰引瓶下入泉口汲水而出井之象也井以汲人水無空竭猶人君以政教飬天下惠澤無窮也九二井谷射鮒九二坎爻也坎為水上直巽生一艮爻也艮為山山下有井必因谷水所生魚無大魚但多鮒魚耳夫感動天地此魚之至大射鮒井谷此魚之至小故以相況甕停水器也井泄不食謂已浚泄也猶臣修正其身以事君也革革攺也水火相息而更用事猶王者受命攺正朔易服色故謂之革也鼎鼎象也卦有木火之用互體乾兑乾為金兑為澤澤鍾金而含水㸑以木火鼎烹熟物之象鼎烹熟以養人猶聖君興仁義之道以教天下也故謂之鼎矣凝命凝成也𥘉六鼎顛趾顛踣也趾足也無事曰趾設陳曰足爻體巽為股𥘉爻在股之下足象也足所以承正鼎也𥘉隂爻而柔與乾同體以否正承乾乾為君以喻君夫人事君若失正禮踣其為足之道情無怨則當以和義出之然如否者嫁於天子雖失禮無出道廢逺之而已若其無子不廢逺之后尊如其犯六出則廢之逺之子廢坤為順又為子母牛在后妃之旁側妾之例也有順德子必賢賢而立以為世子又何咎也九二我仇有疾怨耦曰仇九三雉膏食之美者九四鼎折足覆公餗其刑屋剭釋文刑剭音屋周禮注云其糝謂之餗震為竹竹萌曰筍筍者餗之爼君匙之臣載之鬯秬酒芬芳條鬯因名焉啞啞樂也六二億喪貝十萬曰億反於力六三蘇蘇不安也上六索索猶縮縮足不正也矍矍目不正艮艮之言很也艮為山山立峙各於其所無相順之時猶君在上臣在下恩敬不相與通故謂之艮也九三限要也列其􅘡漸𥘉六干謂大水之傍故停水處九三婦孕不育九三上與九五互體為離離為大腹孕之象也又互體為坎坎為丈夫坎為水水流而去是夫征不復也夫既不復則婦人之道顛覆故孕而不育孕猶娠也歸妹六三歸妹以須須有才智之稱姊名女須姊一作妹天文有須女屈原之上六女承匡無實宗廟之禮主婦奉匡米豐豐之言腆充滿意也𥘉九遇其妃主嘉耦曰妃雖旬無咎𥘉修禮上朝四四以匹敵恩厚待之雖留十日不為咎正以十日者朝聘之禮止於主國以為限聘禮畢歸大禮曰旬而稍旬之外為稍久留非常六二豐其菩菩小席九三豐其芾芾祭祀之蔽膝日中見昧折其右肱三艮爻艮為手互體為巽巽又為進退手而便於進退右肱也猶大臣用事于君君能誅之故無咎上六閴無人貌天際翔也際當為瘵瘵病也自戕也戕傷也旅𥘉六瑣瑣猶小小也爻互體艮艮小石小小之象三為聘客𥘉與二其介也介當以篤實之人為之而用小人瑣瑣然客主人為言不能辭曰非禮不能對曰非禮每者不能以禮行之則其所以得罪兑九四啇兑啇隱度也節節以制度空府臧則傷財力役繁則害民二者奢泰之所致中孚豚魚吉三辰在亥亥為豕爻失正故變而從小名言豚耳四辰在丑丑為鱉蟹鱉蟹魚之微者爻得正故變而從大名言魚耳三體兑兑為澤四上值天淵二五皆坎爻坎為水二侵澤則豚利五亦以水灌淵則西方西鄰象也文王國中也既濟離下坎上離為牛注坊記云東鄰謂紂國中也西鄰謂豕受福喻奢而慢不如儉而敬也與易注不同坎為豕西鄰禴祭則用豕與言殺牛而凶不如殺禴夏祭之名未濟汔幾也凡卦爻二至四二至五兩體交互各成一卦先儒謂之互體繫辭君臣尊卑之貴賤如山澤之有髙卑也動靜雷風也類聚群分謂水火也成象日月星辰也成形謂草木鳥獸也乾以易知易音亦玩其辭震無咎震懼也原始及終精氣為物遊魂為變精氣謂七八也遊魂謂九六也七八木火之數九六金水之數木火用事而物生故曰精氣為物金水用事而物變故曰遊魂為變遊魂謂之鬼物終所歸精氣謂之神物生所信也言木火之神生物東南金水之鬼終物西北二者之情其狀與春夏生物秋冬終物相似地相似故無所差違之也一云二物變化其情與天道濟天下作導道當範圍範法也故君子之道鮮矣臧諸用臧善也言天下之至賾賾當為動愼斯術也術道有功而不置置當作德野容誨淫言妖野容儀大衍之數五十天地之數五十有五以五行氣通凡五行減五大衍又減一故四十九也衍演也揲取也天一生水於北地二生火於南天三生木於東地四生金於西天五生土於中陽無耦隂無配未得相成地六成水於北與天一并天七成火於南與地二并地八成木於東與天三并天九成金於西與地四并地十成土於中與天五并也大衍之數五十有五五行各氣并氣并而減五惟有五十以五十之數不可以為七八九六卜筮之占以用之故更減其一故四十有九也天數五地數五五位相得而各有合天地之氣各有五五行之次一曰水天數也二曰火地數也三曰木天數也四曰金地數也五曰土天數也此五者隂無匹陽無耦故又合之地六為天一匹也天七為地二耦也地八為天三匹也天九為地四耦也地十為天五匹也二五隂陽各有合然後氣相得施化行也研機機當作幾幾微也蓍之德圎而神蓍形圎而可以立變化之數故謂之神也四象布六於北方以象水布八於東方以象木布九於西方以象金布七於南方以象火河出圗洛出書聖人則之春秋緯云河以通乾出天苞洛以流坤吐地符河龍圗發洛龜書感河圗有九篇洛書有六篇有以尚賢也樞户樞也機弩牙也户樞之發或明或暗弩牙之發或中或否以譬言語之發有榮有辱包犧包取也鳥獸全具曰犧蓋取諸乾坤乾為天其色玄坤為地其色黃但土無正位託於南方南方色赤黃而兼赤故為纁也重門擊柝豫坤下震上九四體震又互體有艮艮為門震日所出亦為門重門象艮又為手巽爻也應在四皆木也手持二木也手持二木以相𫾣是為擊柝擊柝為守備警戒也四又互體為坎坎為盜五離爻為甲胄戈兵盜謂持兵是暴客也又以其卦為豫有守備則不可自逸結繩為約事大大其繩事小小其繩書契書之於木刻其側為契各持其一後以相考合以制器者尚其象存於器象可得而用一切器物及造立皆是一君二民君子之道也二君一民小人之道也一君二民謂黃帝堯舜謂地方萬里為方千里者百中國之民居七千里七七四十九方千里者四十九夷狄之民居千里者五十一是中國夷狄二民共事一君二君一民謂三代之末以地方五千里一君有五千里之土五五二十五更足以一君二十五始滿千里之方五十乃當堯舜一民之地故云二君一民男女覯精覯合也男女以隂陽合其精氣因二以濟民行二當為式損德之修也修治也困德之辨也辨别也遭困之時君子固窮小人窮則濫德於是别也益長裕而不設設大也雜物算德算數也居可知矣居音基知者觀其彖辭彖辭爻辭也亹亹汲汲也説卦昔者聖人謂伏犧文王也參天兩地而倚數天地之數備於十乃三之以天兩之以地而倚託大演之數五十也必三之以天兩之以地者天三覆地二載必極於數庶得吉凶之審也揮揚也雷風相薄薄入也莫盛乎艮盛音成裏也其於人也為宣髮宣髮取四月靡草死髮在人體猶靡草在地為黃顙為乾卦乾當為幹陽在外能幹正也為科上稿為黚喙謂虎豹之屬貪冒之類兑為羊其畜好剛鹵序卦訟猶諍也言飲食之會恆多諍也爭一作故受之以豫言國既大而能謙則於政事恬逸雷出地奮逸豫行出而喜樂之意豫必有隨喜樂而出人則隨從孟子曰吾君不遊吾何以休吾君不豫吾何以助此之謂也物稚不可不養也言孩稚不飬則不長也可觀而後有所合易乾鑿度曰陽起於子隂起於午天數天分以陽出離以隂入坎坎為中男離為中女太乙之行出從中男入從中女因隂陽男女之偶為終始也故受之以大過以飬賢者冝過於厚夫婦之道不可以不久也言夫婦當有終身之義夫婦之道謂咸者也致飾然後亨亨許兩反雜卦蠱則飾也易贊易論易之為名也一言而含三義易簡一也變易二也不易三也故繫辭云乾坤其易之緼邪又曰易之門户邪又曰夫乾確然示人易矣夫坤隤然示人簡矣易則易知簡則易從此言其易簡之法則也又曰為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適此言順時變易出入移動者也又云天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣此言其張設布列不易者也據兹三義而説易之道廣矣大矣神農重卦夏曰連山殷曰歸藏周曰周易連山者象山之出雲連連不絶歸藏者莫不歸藏於其中周易者言易道周普無所不備虙羲作十言之教曰乾坤震巽坎離艮兑消息無文字謂之易周易以變者為占故稱九稱六歸妹上六服虔以離為戈兵兑為羊震變為離是用兵剌羊之象也三至五有坎象坎為血血在羊上故剌無血也震為竹竹為筐震變為離離為火火動而上其施不下故筐無實也師之臨服虔云坎為水坤為衆又互體震震為雷雷鼓類又為長子長子帥衆鳴鼓巡水而行行師之象也臨兑為澤坤為地居地而俯視於澤臨下之義故名為臨正義右左傳蠱卦巽下艮上上九艮爻艮為山辰在戍得乾氣父老之象是臣之致事也故不事王侯是不得事君君猶髙尚其所為之事恆卦巽下震上九三爻辭得正互體為乾乾有剛健之德體在巽巽為進退是不恆其德也又互體為兑兑為毀折是將有羞辱也六五以隂爻而處尊位是天子之女又互體兑兑為和説至尊主家之女以和恱幹其家事問正於人故為吉也應在九二又男子之象體在巽巽為進退是無所定而婦言是從故云夫子凶也大過者巽下兑上之卦𥘉六在巽體巽為木上六位在巳巳當巽位巽又為木二木在外以夾四陽四陽互體為二乾乾為君為父二木夾君父是棺椁之象乾道變化謂先有舊形漸漸攺者謂之變雖有舊形忽攺者謂之化及本無舊形非類而攺亦謂之化艮為狗艮卦在丑艮為止以能吠守止人則屬艮以能言則屬兑兑為言故也易蓋亦本諸康成今附卷未右禮記周禮正義以互體説康成注易九卷多論互體江左與王輔嗣學並立荀嵩謂其書根源顔延之為祭酒黜鄭置王齊陸澄詒王儉書云易自商瞿之後雖有異家之學同以象數為宗數年後乃有王弼之説王濟云弼所誤者多何必能頓廢前儒河北諸儒専主鄭氏隋興學者慕弼之學遂為中原之師唐因之今鄭注不傳此景迂朝氏所慨歎也李鼎祚云鄭多參天象王全釋人事易道豈偏滯於天人者哉合彖象於經蓋自康成始其説間見於鼎祚集解及釋文易詩三禮春秋義疏後漢書文選注應麟讀易之暇輯為此編庶幾先儒象數之學猶有考焉癸酉季夏哉生明汲古堂書周易鄭康成注卷終
