body:
  text: 周易鄭康成註易類提要臣等謹案周易鄭康成註一卷宋王應麟編應麟字伯厚慶元人自署浚儀葢其祖籍也淳祐元年進士寶祐四年復中博學鴻詞科官至禮部尚書兼給事中事迹具宋史儒林𫝊案隋志載鄭元周易註九卷又稱鄭元王弼二註梁陳列於國學齊代惟𫝊鄭義至隋王註盛行鄭學寖微然新唐書著録十卷是唐時其書猶在故李鼎祚集解多引之宋崇文總目惟載一卷所存者僅文言序卦説卦雜卦四篇餘皆散佚至中興書目始不著録案中興書目今不𫝊此據馮椅易學所引則亡於南北宋之間故晁説之朱震尚能見其遺文而淳熙以後諸儒即罕所稱引也應麟始旁摭諸書裒為此帙經文異字亦皆並存其無經文可綴者則總録末簡又以元註多言互體併取左𫝊禮記周禮正義中論互體者八條以類附焉考元初從第五元先受京氏易又從馬融受費氏易故其學出入於兩家然要其大㫖費義居多實為𫝊易之正脈齊陸澄與王儉書曰王弼註易元學之所宗今若崇儒鄭註不可廢其論最篤唐初詔修正義仍黜鄭崇王非逹識也應麟能於散佚之餘蒐羅放失以存漢易之一綫可謂篤志遺經研心古義者矣近時恵棟别有考訂之本體例較密然經營剏始實自應麟其捃拾之勞亦不可冺今并著於録所以兩存其功也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2ebe2d09b4bff9dbb9a69985e549036914579105b0257ecdba13dcdcff382123
