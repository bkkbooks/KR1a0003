body:
  text: 周易鄭康成注宋王應麟編乾九二見龍在田二於三才為地道地上即田故稱田也九二利見九五之大人九三君子終日乾乾三於三才為人道有乾徳而在人道君子之象九五飛龍在天五於三才為天道天者清明無形而龍在焉飛之象也上九亢龍有悔堯之末年四凶在朝是以有悔未大凶也用九見羣龍无首吉六爻皆體龍一作乾羣龍之象也舜既受道禹與稷契咎繇之屬並在于朝萬物資始乃統天資取也統本也大人造也造為也不成乎名當隱之時以從世俗不自殊異无所成名也確乎其不可拔拔移也聖人作作起也利貞者情性也坤履霜履讀為禮六二直也方也地之性此爻得中氣而在地上自然之性廣生萬物故主動直而且方龍戰于野聖人喻龍君子喻蛇儀禮注蛇龍君子之類必有餘殃殃禍惡也慊於无陽慊讀如羣公溓之溓古書篆作立心與水相近讀者失之故作溓溓雜也隂謂此上六也陽謂今消息用事乾也上六為蛇得乾氣雜似龍釋文云鄭作謙屯而不寧讀而曰能能猶安也六二乗馬般如馬牝牡曰乗冓猶㑹也六三機不如舎弩牙也蒙蒙幼小之貌齊人謂萌為蒙也蒙亨匪我求童蒙蒙者蒙蒙物初生形是其未開著之名也人幼稚曰童未冠之稱亨者陽也互體震而得中嘉㑹禮通陽自動其中徳施地道之上萬物應之而萌芽生教授之師取象焉修道藝於其室而童蒙者求為之弟子非已乎求之也弟子初問則告之以事義不思其三隅相況以反解而筮者此勤師而功寡學者之災也瀆筮則不復告欲令思而得之亦所以利義而幹事是也初六用說桎梏木在足曰桎在手曰梏九二包蒙包當作彪彪文也六五順以㢲也㢲當作遜需需讀為秀陽氣秀而不直前者畏上坎也位乎天位位音涖宴享宴也九二需于沚九三致戎至訟辯才曰訟有孚咥咥覺悔貌九二歸而逋其邑人三百戸无𤯝小國之下大夫采地方一成其定税三百家故三百戸也不易之田歲種之一易之田休一歲乃種再易之田休二歲乃種言至薄也茍自藏隱不敢與五相敵則无災眚眚過也患至惙也惙憂也九四渝然也上九鞶帶佩鞶之帶三拕之拕徒可反師軍二千五百人為師多以軍為名次以師為名少以旅為名師者舉中之言丈人能以法度長於人丈之言長能御衆有正人之徳以法度為人之長吉而无咎謂天子諸侯主軍者初六否藏凶否方有反九二王三錫命􅃂光耀也比初六有孚盈􅇲爻辰在未上值東井井之水人所汲用􅇲􅇲汲器也九五王用三􅇌失前禽王因天下顯習兵于蒐狩焉驅禽而射之三則已𤼵軍禮也失前禽者謂禽在前来者不逆而射之傍去又不射唯背走者順而射之不中亦已是皆所以失之用兵之法亦如之降者不殺奔者不禁皆敵不殺以仁恩養威之道小畜畜養也九三輿説輻謂輿下縳木與軸相連鈎心之木是也輻伏莬泰泰通也后以財成天地之道財節也輔相左右助也以者取其順隂陽之節為出内之政春崇寛仁夏以長養秋教收斂冬勅蓋藏皆可以成物助民也初九彚類也茹牽引也茅喻君有絜白之徳臣下引其類而仕之茅音苗九二荒讀為康虚也六五帝乙歸妹以祉元吉五爻辰在􅆗春為陽中萬物以生生育者嫁娶之貴仲春之月嫁娶男女之禮福祿大吉否九四􅔧離祉九五繋于苞桑猶紂囚文王於羑里之獄四臣獻珍異之物而終免於難繫于苞桑之謂同人乾為天離為火卦體有㢲㢲為風天在上火炎上而從之是其性同於天也火得風然後炎上益熾是猶人君在上施政教使天下之人和同而事之以是為人和同者君之所為也故謂之同人風行无所不遍遍則㑹通之徳大行故曰同人于野亨六二天子諸侯后夫人無子不出九三莽叢木也九四乗其庸大有明辯遰也讀如明星晢晢六五體離處乾之上猶大臣有聖明之徳代君為政處其位有其事而理之也元亨者又能長羣臣以善使嘉㑹禮通若周公攝政朝諸侯於明堂是也謙君子有終艮為山坤為地山體髙今在地下其於人道高能下下謙之象亨者嘉㑹之禮以謙為主謙者自貶損以下人唯艮之堅固坤之厚順乃能終之故君子之人有終也捊多益寡捊取也撝謙讀為宣初六牧養也豫坤順也震動也順其性而動者莫不得其所故謂之豫豫喜豫悦樂之貌也震又為雷諸侯之象坤又為衆師役之象故利建侯行師靁出地奮奮動也靁動於地上而萬物豫也忒差也六二砎于石右八切盖謂唐砎也六三盱誇也九四由豫由用也簪速也上六㝠豫㝠讀為鳴隨震動也兑説也内動之以徳外説之以言則天下之人一作民咸慕其行而隨從之故謂之隨也既見隨從能長之以善通其嘉禮和之以義幹之以正則功成而有福若无此四徳則有凶咎焉出門交有功震為大塗又為日門當春分隂陽之所交也是臣出君門與四方賢人交有成功之象也昔舜慎徽五典五典克從納于百揆百揆時序賓于四門四門穆穆是其義也蠱先甲三日後甲三日甲者造作新令之日先之三日而用辛也欲取改過自新之義後之三日而用丁也取其丁寧之義臨臨大也陽氣自此浸而長大陽浸長矣而有四徳齊功於乾盛之極也人之情盛則奢滛奢淫將亡故戒以凶也臨卦斗建丑而用事殷之正月也當文王之時紂為无道故于是卦為殷家著興衰之戒以見周改殷正之數云臨自周二月用事訖其七月至八月而遯卦受之此終而復始王命然矣觀坤為地為衆巽為木為風九五天子之爻互體有艮艮為鬼門又為宫闕地上有木而為鬼門宫闕者天子宗廟之象也觀盥而不薦諸侯貢士於天子鄉大夫貢士於其君必以禮賔之唯主人盥而獻賔賔盥而酢主人設薦俎則弟子也初六童觀童稚也噬嗑敕法敕猶理也九四噬乾胏胏簀也上九離為槁木坎為耳木在耳上何校滅耳之象也聰不明也目不明耳不聰賁賁變也文飾之貌賁文飾也離為日日天文也艮為石石地文也天文在下地文在上天地之文交相飾成賁者也猶人君以剛柔仁義之道飾成其徳也剛柔雜仁義合然後嘉㑹禮通故亨也卦互體坎艮艮止于上坎險於下夾震在中故不利大行小有所之則可矣折獄折斷也初九舎輿而徒六四賁如燔如六四巽爻也有應於初九欲自飾以適初既進退未定故燔如也白馬翰如謂九三位在辰得巽氣為白馬翰猶幹也見六四適初未定欲幹而有之翰白也剥隂氣侵陽上至於五萬物零落故謂之剥也五隂一陽小人極盛君子不可有所之故不利有攸往也六二剥牀以辨足上稱辨謂近膝之下屈則相近申則相逺故謂之辨辨分也蔑輕慢六四切近災也切急也小人剥廬小人傲很當剥徹廬舎而去復復反也還也隂氣侵陽陽失其位至此始還反起於初故謂之復陽君象君失國而還反道徳更興也商旅不行資貨而行曰商旅客也初九无祗悔祗病也六三卑復六五中以自考考成也上六有災眚異自内生曰眚自外曰祥害物曰災无妄妄猶望謂无所希望也祐助也六二不菑畬一歲曰菑二歲曰新田三歲曰畬大畜日新絶句其徳連下句良馬逐逐兩馬走也日閑輿衞日習車徒自九三至上九有頥象居外是不家食而養賢六四童牛之梏元吉巽為木互體震震為牛之足足在艮體之中艮為手持木以就足是施梏鄭志泠剛問蒙初六注云木在足曰桎在手曰梏今大畜六四施桎于足不審桎梏手足定有别否答曰牛無手故以足言之六五豶豕之牙牙讀為互上九艮為手手上肩也乾為首首肩之間荷物處乾為天艮為徑路天衢象也頥朶動也頥者口車輔之名也震動於下艮止於上口車動而上因輔嚼物以養人故謂之頥頥養也能行養則其幹事故吉矣二五離爻皆得中離為目觀象也觀頥觀其養賢與不肖也頥中有物者口實自二至五有二坤坤載養物而人所食之物皆存焉觀其求可食之物則貪亷之情可别也大過九二枯楊生荑枯音姑謂无姑山榆荑木更生音夷謂山榆之實以丈夫年過娶二十之女老婦年過嫁於三十之男皆得其子習坎六三檢且枕木在手曰檢木在首曰枕六四尊酒簋貳用􅇲納約自牖六四上承九五又互體在震上爻辰在丑丑上值斗可以斟之象斗上有建星建星之形似簋貳副也建星上有弁星弁星之形又如缶天子大臣以王命出㑹諸侯主國尊於簋副設元酒而用缶也九五祗既平祗當為坻小邱也上六繋拘也爻辰在己巳為虵虵之蟠屈似徽纆也三五互體艮又與震同體艮為門闕於木為多節震之所為有叢拘之類門闕之内有叢木多節之木是天子外朝左右九棘之象也外朝者所以詢事之處也左嘉石平罷民焉右肺石達窮民焉罷民邪惡之民也上六乘陽有邪惡之罪故縛約徽墨置于叢棘而後公卿以下議之其害人者置之圜土而施職事焉以明刑耻之能復者上罪三年而赦中罪二年而赦下罪一年而赦不得者不自思以得正道終不自改而出圜土者殺故凶離明兩作離作起也九三不擊缶而歌艮爻也位在丑丑上值弁星弁星似缶詩云坎其擊缶則樂器亦有缶麗王公也九四突如其来如震為長子爻失正又互體兑兑為附決子居明法之家而無正何以自繼其君父之志也突如震之失正不知其所如又為巽巽為進退不知所従不孝之罪五刑莫大焉得用議貴之辟刑之莫如所犯之罪焚如殺其親之刑死如殺人之刑也棄如流宥之刑咸咸感也艮為山兑為澤山氣下澤氣上二氣通而相應以生萬物故曰咸也其於人也嘉㑹禮通和順於義幹事能正三十之男有此三徳以下二十之女正而相親説娶之則吉也初六拇足大指也六二腓膊腸也九五脢背脊肉也上六媵口説也媵送也咸道極薄徒送口舌言語相感而已不復有志於其間恒恒久也巽為風震為雷雷風相須而養物猶長女承長男夫婦同心而成家久長之道也夫婦以嘉㑹禮通故无咎其能和順幹事所行而善矣初六濬恒九三或承之羞巽為進退不恒其徳之象又互體兑兑為毁折後將有羞辱也上六振恒振摇落也遯遯逃去之名也艮為門闕乾有健徳互體有巽巽為進退君子出門行有進退逃去之象二五得位而有應是用正道得禮見召聘始仕他國當尚謙謙小其和順之道居小官幹小事其進以漸則逺妬忌之害昔陳敬仲奔齊辭卿是也九三憊困也九四否塞也備鄙反大壯壯氣力浸强之名九三纍其角六五䘮羊于易音亦謂佼易也上六不祥也祥善也晉康侯康尊也廣也晝日三接音㨗接勝也蕃庶蕃𤼵袁反庶止奢反謂蕃遮禽也明出地上晉地雖生萬物日出于上其功乃著故君子法之而以明自照其徳初六摧如讀如南山崔崔之崔六二愁如愁子小反變色貌九四鼫鼠詩云碩鼠碩鼠无食我黍謂大鼠也六五矢得勿恤明夷夷傷也日出地上其明乃光至其入也明則傷矣故謂之明夷日之明傷猶聖人君子有明徳而遭亂世抑在下位則宜自艱无幹事政以避小人之害也文王似之箕子似之拯承也六二明夷睇于左股旁視為睇六二辰在酉酉是西方又下體離離為目九三體在震震東方九三又在辰辰得巽氣為股此謂六二有明徳欲承九三故云睇于左股家人初九閑習也九三嗃嗃苦熱之意嘻嘻驕佚喜笑之意九五假登也六二中饋酒食也睽睽乖也火欲上澤欲下猶人同居而志異也故謂之睽二五相應君隂臣陽君而應臣故小事吉睽音圭六三其牛㸷牛角皆踊曰㸷蹇往得中也中和也初六宜待時也六四往蹇来連連如字遲久之意解百果草木皆甲宅木實曰果皆讀如人倦之解解謂坼呼呼火亞反皮曰甲根曰宅宅居也損艮為山兑為澤互體坤坤為地山在地上澤在地下澤以自損増山之髙也猶諸侯損其國之富以貢獻於天子故謂之損矣二簋可用享四以簋進黍稷於神也初與二直其四與五承上故用二簋四巽爻也巽為木五離爻也離為日日體圜木器而圜簋象也六五十朋之龜案爾雅云十朋之龜者一曰神龜二曰靈龜三曰攝龜四曰寶龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜徴忿懫欲徴猶清也懫止也益隂陽之義陽稱為君隂為臣今震一陽二隂臣多於君矣而四體巽之不應初是天子損其所有以下諸侯也人君之道以益下為徳故謂之益也震為雷巽為風雷動風行二者相成猶人君出教令臣奉行之故利有攸往利涉大川矣夬夬決也陽氣浸長至於五五尊位也而隂先之是猶聖人積徳悦天下以漸消去小人至於受命為天子故謂之夬揚越也五互體乾乾為君又居尊位王庭之象也隂爻越其上小人乗君子罪惡上聞于聖人之朝故曰夬揚于王庭九二惕號音号莫夜莫如字无也无夜非一夜九三壯于頯頯夾面也九五莧陸一名商陸遘遇也一隂承五陽一女當五男茍相遇耳非禮之正故謂之遘女壯如是壯健似滛故不可娶婦人以婉娩為其徳也詰四方詰正也九五杞桞也萃萃亨无亨字萃聚也坤為順兑為悦臣下以順道承事其君悦徳居上待之上下相應有事而和通故曰萃亨也假至也互有艮巽為木艮為闕木在闕上宫室之象也四本震爻震為長子五本坎爻坎為隱伏居尊而隱伏鬼神之象長子入闕升堂祭祖禰之禮也故曰王假有廟二本離爻也離為目居正應五故利見大人矣大牲牛也言大人有嘉㑹時可幹事必殺牛以盟既盟則可以行故曰利往除戎器除去也初六一握握當讀為夫三為屋之屋六二禴夏祭名上六自目曰涕自鼻曰洟昇昇上也坤地巽木木生地中日長而上猶聖人在諸侯之中明徳日益髙大也故謂之昇昇進益之象六四王用亨于岐山亨獻也許兩反困坎為月互體離離為日兑為暗昧日所入也今上掩日月之明猶君子處亂世為小人所不容故謂之困也君子雖困居險能悦是以通而无咎也九二困于酒食朱韍方来利用享祀二據初辰在未未為土此二為大夫有地之象未上值天厨酒食象困于酒食者采地薄不足已用也二與日為體離為鎮霍爻四為諸侯有明徳受命當王者離為火火色赤四爻辰在午時離氣赤又朱是也文王將王天子制用朱韍朱深于赤九五劓刖當為倪㐳井井法也坎水也巽木桔橰也互體離兑離外堅中虚瓶也兑為暗澤泉口也言桔橰引瓶下入泉口汲水而出井之象也井以汲人水无空竭猶人君以政教養天下惠澤无窮也九二井谷射鮒九二坎爻也坎為水上直巽九三艮爻也艮為山山下有井必因谷水所生魚無大魚但多鮒魚耳夫感動天地此魚之至大射鮒井谷此魚之至小故以相況甕停水器也井渫不食謂已浚渫也猶臣修正其身以事君也革革改也水火相息而更用事猶王者受命改正朔易服色故謂之革也鼎鼎象也卦有木火之用互體乾兑乾為金兑為澤澤鍾金而含水㸑以木火鼎烹熟物之象鼎烹熟以養人猶聖君興仁義之道以教天下也故謂之鼎矣凝命凝成也初六鼎顛趾顛踣也趾足也無事曰趾設陳曰足爻體巽為股初爻在股之下足象也足所以承正鼎也初隂爻而柔與乾同體以否正承乾乾為君以喻君夫人事君若失正禮踣其為足之道情無怨則當以和義出之然如否者嫁於天子雖失禮无出道廢逺之而已若其无子不廢逺之后尊如故其犯六出則廢之逺之子廢坤為順又為子母牛在后妃之旁側妾之例也有順徳子必賢賢而立以為世子又何咎也九二我仇有疾怨耦曰仇九三雉膏食之美者九四鼎折足覆公餗其刑屋釋文剭剭周禮注云其刑音屋糝謂之餗震為竹竹萌曰筍筍者餗之為菜也餗美饌具八珍之食鼎三足三公象若三公傾覆王之美道屋中刑之一云臣下曠官失君之美道當刑之于屋中珍餗一作蔌注一蔌為八所用六五金鉉喻明道能舉君之官職也震震驚百里不䘮七鬯震為雷雷動物之氣也雷之𤼵聲猶人君出政教以動國中之人也故謂之震人君有善聲教則嘉㑹之禮通矣驚之言警戒也雷𤼵聲聞於百里古者諸侯之象諸侯之出教令能警戒其國疆之内則守其宗廟社稷為之祭主不亡其七與鬯也人君於祭之禮七牲體薦鬯而已其餘不親為也升牢於俎君七之臣載之鬯秬酒芬芳條鬯因名焉啞啞樂也六二億䘮貝十萬曰億於力反六三蘇蘇不安也上六索索猶縮縮足不正也矍矍目不正艮艮之言很也艮為山山立峙各於其所无相順之時猶君在上臣在下恩敬不相與通故謂之艮也九三限要也列其􅘡漸初六干謂大水之傍故停水處九三婦孕不育九三上與九五互體為離離為大腹孕之象也又互體為坎坎為大夫坎為水水流而去是夫征不復也夫既不復則婦人之道顛覆故孕而不育孕猶娠也歸妹六三歸妹以須須有才智之稱天文有須女屈原之姊名女須姊一作妹上六女承筐无實宗廟之禮主婦奉筐米豐豐之言腆充滿意也初九遇其妃主嘉耦曰妃雖曰无咎初修禮上朝四四以匹敵恩厚待之雖留十旬不為咎正以十日者朝聘之禮止於主國以為限聘禮畢歸大禮曰旬而稍旬之外為稍久留非常六二豐其菩菩小席九三豐其芾芾祭祀之蔽膝日中見昧折其右肱三艮爻艮為手互體為巽巽又為進退手而便于進退右肱也猶大臣用事于君君能誅之故无咎上六􅔚無人貌天際翔也際當為瘵瘵病也自戕也戕傷也旅初六瑣瑣猶小小也爻互體艮艮小石小小之象三為聘客初與二其介也介當以篤實之人為之而用小人瑣瑣然客主人為言不能辭曰非禮不能對曰非禮每者不能以禮行之則其所以得罪兑九四商兑商隱度也節節以制度空府藏則傷財力役繁則害民二者奢泰之所致中孚豚魚吉三辰在亥亥為豕爻失正故變而從小名言豚耳四辰在丑丑為鼈蟹鼈蟹魚之微者爻得正故變而從大名言魚耳互體兑兑為澤四上值天淵二五皆坎爻坎為水二侵澤則豚利五亦以水灌淵則魚利豚魚以喻小民也而為明君賢臣恩意所供養故吉乘木舟虚也舟謂集板如今自空大木為之曰虚小過不宜上上如字謂君也中孚為陽貞於十一月子小過為隂貞於六月未法於乾坤既濟既已也盡也濟度也六二茀車蔽也九三憊劣弱也九五東鄰殺牛不如西鄰之禴祭互體為坎又互體為離離為日坎為月日出東方東鄰象月出西方西鄰象也坊記疏云東鄰謂紂國中也西鄰謂文王國中也既濟離下坎上離為牛坎為豕西鄰禴祭則用豕與言殺牛而凶不如殺豕受福喻奢而慢不如儉而敬也與易注不同禴夏祭之名未濟汔㡬也凡卦爻二至四三至五兩體交互各成一卦先儒謂之互體繫辭君臣尊卑之貴賤如山澤之有髙卑也動静雷風也類聚羣分謂水火也成象日月星辰也成形謂草木鳥獸也乾以易知音亦翫其辭震无咎震懼也原始及終精氣為物遊魂為變精氣謂七八也遊魂謂九六也七八木火之數九六金水之數木火用事而物生故曰精氣為物金水用事而物變故曰遊魂為變遊魂謂之鬼物終所歸精氣謂之神物生所信也言木火之神生物東南金水之鬼終物西北二者之情其狀與春夏生物秋冬終物相似一云二物變化其情與天地相似故無所差違之也道濟天下道當作導範圍範法也故君子之道尟矣臧諸用臧善也言天下之至賾賾當為動慎斯術也術道有功而不置置當作誌野容誨滛言妖野容儀大衍之數五十天地之數五十有五以五行氣通凡五行減五大衍又減一故四十九也衍演也揲取也天一生水於北地二生火於南天三生木於東地四生金於西天五生土於中陽无耦隂无配未得相成地六成水於北與天一并天七成火於南與地二并地八成木於東與天三并天九成金於西與地四并地十成土於中與天五并也大衍之數五十有五五行各氣并氣并而減五惟有五十以五十之數不可以為七八九六卜筮之占以用之故更減其一故四十有九也天數五地數五五位相得而各有合天地之氣各有五五行之次一曰水天數也二曰火地數也三曰木天數也四曰金地數也五曰土天數也此五者隂无匹陽无耦故又合之地六為天一匹也天七為地二耦也地八為天三匹也天九為地四耦也地十為天五匹也二五隂陽各有合然後氣相得施化行也研機機當作㡬㡬微也蓍之徳圓而神蓍形圓而可以立變化之數故謂之神也四象布六於北方以象水布八於東方以象木布九於西方以象金布七於南方以象火河出圖洛出書聖人則之春秋緯云河以通乾出天苞洛以流坤吐地符河龍圖𤼵洛龜書感河圖有九篇洛書有六篇有以尚賢也樞戸樞也機弩牙也戸樞之𤼵或明或闇弩牙之𤼵或中或否以譬言語之𤼵有榮有辱包犧包聚也鳥獸全具曰犧盖取諸乾坤乾為天其色元坤為地其色黄但土無正位託於南方南方色赤黄而兼赤故為纁也重門擊柝豫坤下震上九四體震又互體有艮艮為門震日所出亦為門重門象艮又為手巽爻也應在四皆木也手持二木也手持二木以相敲是為擊柝擊柝為守備警戒也四又互體為坎坎為盜五離爻為甲胄戈兵盜謂持兵是暴客也又以其卦為豫有守備則不可自逸結繩為約事大大其繩事小小其繩書契書之於木刻其側為契各持其一後以相考合以制器者尚其象存於器象可得而用一切器物及造立皆是一君二民君子之道也二君一民小人之道也一君二民謂黄帝堯舜謂地方萬里為方千里者百中國之民居七千里七七四十九方千里者四十九夷狄之民居千里者五十一是中國夷狄二民共事一君二君一民謂三代之末以地方五千里一君有五千里之土五五二十五更足以一君二十五始滿千里之方五十乃當堯舜一民之地故云二君一民男女覯精覯合也男女以隂陽合其精氣因貳以濟民行貳當為弍損徳之修也修治也困徳之辯也辯别也遭困之時君子固窮小人窮則濫徳於是别也益長裕而不設設大也雜物算徳算數也居可知矣居音基知者觀其彖辭彖辭爻辭也亹亹汲汲也説卦昔者聖人謂伏犧文王也參天兩地而倚數天地之數備於十乃三之以天兩之以地而倚託大演之數五十也必三之以天兩之以地者天三覆地二載必極於數庶得吉凶之審也揮揚也雷風相薄薄入也莫盛乎艮盛音成裏也其于人也為宣髮宣髮取四月靡草死髮在人體猶靡草在地為黄顙為乾卦乾當為幹陽在外能幹正也為科上槀為黚喙謂虎豹之屬貪冒之類兑為羊其畜好剛鹵序卦訟猶爭也言飲食之㑹恒多諍也一作争故受之以豫言國既大而能謙則于政事恬逸雷出地奮逸豫行出而喜樂之意豫必有隨喜樂而出人則隨從孟子曰吾君不㳺吾何以休吾君不豫吾何以助此之謂也物穉不可不養也言孩稚不養則不長也可觀而後有所合易乾鑿度曰陽起于子隂起于午天數天分以陽出離以隂入坎坎為中男離為中女太乙之行出從中男入從中女因隂陽男女之偶為終始也故受之以大過以養賢者宜過于厚夫婦之道不可以不久也言夫婦當有終身之義夫婦之道謂咸恒也致飾然後亨亨許兩反雜卦蠱則飾也易贊易論易之為名也一言而含三義易簡一也變易二也不易三也故繫辭云乾坤其易之藴邪又曰易之門户邪又曰夫乾確然示人易矣夫坤隤然示人簡矣易則易知簡則易從此言其易簡之法則也又曰為道也屢遷變動不居周流六虚上下无常剛柔相易不可為典要唯變所適此言順時變易出入移動者也又云天尊地卑乾坤定矣卑髙以陳貴賤位矣動静有常剛柔斷矣此言其張設布列不易者也據兹三義而説易之道廣矣大矣神農重卦夏曰連山殷曰歸藏周曰周易連山者象山之出雲連連不絶歸藏者莫不歸藏于其中周易者言易道周普无所不備虙羲作十言之教曰乾坤震巽坎離艮兑消息无文字謂之易周易以變者為占故稱九稱六原闕歸妹上六服䖍以離為戈兵兑為羊震變為離是用兵刺羊之象也三至五有坎象坎為血血在羊上故刺无血也震為竹竹為筐震變為離離為火火動而上其施不下故筐无實也師之臨服䖍云坎為水坤為衆又互體震震為雷雷鼓類又為長子長子帥衆鳴鼓巡水而行行師之象也臨兑為澤坤為地居地而俯視于澤臨下之義故名為臨右左𫝊正義蠱卦巽下艮上上九艮爻艮為山辰在戌得乾氣父老之象是臣之致事也故不事王侯是不得事君君猶高尚其所為之事恒卦巽下震上九三爻辭得正互體為乾乾有剛健之徳體在巽巽為進退是不恒其徳也又互體為兑兑為毁折是將有羞辱也六五以隂爻而處尊位是天子之女又互體兑兑為和説至尊主家之女以和説幹其家事問正於人故為吉也應在九二又男子之象體在巽巽為進退是无所定而婦言是從故云夫子凶也大過者巽下兑上之卦初六在巽體巽為木上六位在已已當巽位巽又為木二木在外以夾四陽四陽互體為二乾乾為君為父二木夾君父是棺椁之象乾道變化謂先有舊形漸漸改者謂之變雖有舊形忽改者謂之化及本無舊形非類而改亦謂之化艮為狗艮卦在丑艮為止以能吠守止人則屬艮以能言則屬兑兑為言故也右禮記周禮正義以互體説易盖亦本諸康成今附卷末原跋康成注易九卷多論互體江左與王輔嗣學竝立荀崧謂其書根源顔延之為祭酒黜鄭置王齊陸澄詒王儉書云易自商瞿之後雖有異家之學同以象數為宗數年後乃有王弼之説王濟云弼所誤者多何必能頓廢前儒河北諸儒專主鄭氏隋興學者慕弼之學遂為中原之師唐因之今鄭注不𫝊此景迂晁氏所慨歎也李鼎祚云鄭多參天象王全釋人事易道豈偏滯於天人者哉合彖象於經葢自康成始其説間見於鼎祚集解及釋文易詩三禮春秋義疏後漢書文選注應麟讀易之暇輯為此編庶㡬先儒象數之學猶有攷焉癸酉季夏哉生明汲古堂書周易鄭康成注
